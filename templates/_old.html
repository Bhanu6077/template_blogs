<!DOCTYPE html>
<html>
<head>
    <title>HanuAi Blogs</title>
    <style>
        body { font-family: Arial; padding: 40px; background:#f5f5f5; }
        input, textarea { width:100%; padding:10px; margin-top:10px; }
        .section { background:white; padding:15px; margin-top:15px; border-radius:10px; }
        button { padding:10px 15px; margin-top:10px; }
    </style>
</head>
<body>

<h1>📄 HanuAi Blogs</h1>

<form id="blogForm" enctype="multipart/form-data">

    <!-- MAIN BLOG -->
    <input type="text" name="title" placeholder="Main Title">
    <textarea name="description" placeholder="Intro Description"></textarea>
    <input type="file" name="hero">

    <!-- SECTIONS -->
    <div id="sections"></div>

    <button type="button" onclick="addSection()">➕ Add Section</button>

    <br><br>

    <button type="button" onclick="submitForm('pdf')">Export PDF</button>
    <button type="button" onclick="submitForm('docx')">Export DOCX</button>

</form>

<script>
let count = 0;

function addSection() {
    const div = document.createElement("div");
    div.className = "section";

    div.innerHTML = `
        <input type="text" name="heading_${count}" placeholder="Sub Heading">
        <textarea name="content_${count}" placeholder="Content"></textarea>
        <input type="file" name="image_${count}">
    `;

    document.getElementById("sections").appendChild(div);
    count++;
}

function submitForm(type) {
    const form = document.getElementById("blogForm");
    const formData = new FormData(form);

    fetch(type === "pdf" ? "/export-pdf" : "/export-docx", {
        method: "POST",
        body: formData
    })
    .then(res => res.blob())
    .then(blob => {
        const link = document.createElement("a");
        link.href = window.URL.createObjectURL(blob);
        link.download = type === "pdf" ? "blog.pdf" : "blog.docx";
        link.click();
    });
}
</script>

</body>
</html>
