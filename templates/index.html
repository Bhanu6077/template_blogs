<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HanuAi Blogs</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #2562EA;
            --primary-light: #5F8FF5;
            --primary-dark: #30446E;
            --bg: #F0F4FF;
            --surface: #FFFFFF;
            --surface-alt: #F7F9FF;
            --border: #DDE5F8;
            --text-main: #1A2540;
            --text-sub: #4A5980;
            --text-hint: #8A96B5;
            --accent-glow: rgba(37,98,234,0.10);
            --radius: 14px;
            --radius-sm: 8px;
            --shadow: 0 2px 16px rgba(37,98,234,0.08);
            --shadow-md: 0 4px 32px rgba(37,98,234,0.13);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 0;
        }

        /* ── HEADER ── */
        .topbar {
            background: var(--primary-dark);
            padding: 0 48px;
            display: flex;
            align-items: center;
            height: 64px;
            gap: 12px;
        }
        .topbar-logo {
            font-family: 'Sora', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .topbar-logo span {
            color: var(--primary-light);
        }
        .topbar-badge {
            font-size: 11px;
            font-weight: 500;
            background: rgba(95,143,245,0.22);
            color: var(--primary-light);
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ── PAGE LAYOUT ── */
        .page {
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        .page-header {
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-family: 'Sora', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-dark);
            letter-spacing: -0.4px;
        }
        .page-header p {
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 6px;
        }

        /* ── CARDS ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 32px;
            margin-bottom: 20px;
        }
        .card-label {
            font-family: 'Sora', sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary-light);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── FORM FIELDS ── */
        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-sub);
            margin-bottom: 6px;
            letter-spacing: 0.1px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 11px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
        }
        input[type="text"]:focus,
        textarea:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(37,98,234,0.10);
        }
        input[type="text"]::placeholder,
        textarea::placeholder { color: var(--text-hint); }

        textarea { resize: vertical; min-height: 96px; line-height: 1.6; }

        /* ── FILE UPLOAD ── */
        .file-upload {
            position: relative;
            width: 100%;
        }
        .file-upload input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
        }
        .file-upload-ui {
            background: var(--surface-alt);
            border: 1.5px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 9px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color 0.18s, background 0.18s;
        }
        .file-upload:hover .file-upload-ui {
            border-color: var(--primary-light);
            background: #EEF3FF;
        }
        .file-upload-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #EEF3FF, #D8E6FF);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .file-upload-icon svg { width: 14px; height: 14px; }
        .file-upload-text { flex: 1; min-width: 0; }
        .file-upload-text strong {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-upload-text span {
            display: block;
            font-size: 11px;
            color: var(--text-hint);
            margin-top: 1px;
        }
        /* uploaded state */
        .file-upload.has-file .file-upload-ui {
            border-style: solid;
            border-color: #4CAF82;
            background: #F2FBF6;
        }
        .file-upload.has-file .file-upload-icon {
            background: linear-gradient(135deg, #E0F5EA, #C3EDD6);
        }
        .file-upload.has-file .file-upload-icon svg { stroke: #4CAF82; }
        .file-upload.has-file .file-upload-text strong { color: #2E7D5A; }
        .file-upload.has-file .file-upload-text span { color: #6AAF8C; }
        .file-upload-badge {
            display: none;
            font-size: 10px;
            font-weight: 600;
            background: #4CAF82;
            color: #fff;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }
        .file-upload.has-file .file-upload-badge { display: block; }

        /* ── SECTIONS CONTAINER ── */
        #sections { display: flex; flex-direction: column; gap: 20px; margin-bottom: 4px; }

        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .section-header {
            background: linear-gradient(90deg, #EEF3FF, #F7F9FF);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .section-header-left {
            font-family: 'Sora', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-counter {
            background: var(--primary);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            width: 20px; height: 20px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-remove {
            background: none;
            border: 1px solid #F0D5D5;
            color: #C0564A;
            font-size: 12px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s;
        }
        .btn-remove:hover { background: #FFF0EE; }
        .section-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }

        /* ── BUTTONS ── */
        .btn-add {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: 1.5px dashed var(--primary-light);
            color: var(--primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            width: 100%;
            justify-content: center;
            margin-top: 4px;
            transition: background 0.15s, border-color 0.15s;
        }
        .btn-add:hover { background: #EEF3FF; border-color: var(--primary); }
        .btn-add svg { width: 16px; height: 16px; }

        /* ── EXPORT BAR ── */
        .export-bar {
            position: sticky;
            bottom: 0;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: flex-end;
            z-index: 100;
        }
        .export-label {
            font-size: 13px;
            color: var(--text-hint);
            margin-right: 4px;
        }
        .btn-export {
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 11px 22px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: transform 0.12s, box-shadow 0.12s;
        }
        .btn-export:active { transform: scale(0.97); }
        .btn-export.pdf {
            background: var(--surface);
            color: var(--primary-dark);
            border: 1.5px solid var(--border);
            box-shadow: var(--shadow);
        }
        .btn-export.pdf:hover { box-shadow: var(--shadow-md); border-color: var(--primary-light); }
        .btn-export.docx {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            box-shadow: 0 4px 18px rgba(37,98,234,0.30);
        }
        .btn-export.docx:hover { box-shadow: 0 6px 24px rgba(37,98,234,0.40); }
        .btn-export svg { width: 15px; height: 15px; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-logo">Hanu<span>Ai</span></div>
    <div class="topbar-badge">Blog Studio</div>
</div>

<div class="page">
    <div class="page-header">
        <h1>Create New Blog</h1>
        <p>Compose your article, add sections and images, then export to your preferred format.</p>
    </div>

    <form id="blogForm" enctype="multipart/form-data">

        <!-- MAIN BLOG CARD -->
        <div class="card">
            <div class="card-label">Blog Overview</div>

            <div class="field">
                <label>Main Title</label>
                <input type="text" name="title" placeholder="Enter your blog title…">
            </div>

            <div class="field">
                <label>Intro Description</label>
                <textarea name="description" placeholder="Write an engaging introduction for your readers…"></textarea>
            </div>

            <div class="field">
                <label>Hero Image</label>
                <div class="file-upload">
                    <input type="file" name="hero" accept="image/*" onchange="handleFileChange(this)">
                    <div class="file-upload-ui">
                        <div class="file-upload-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#2562EA" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="3"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                        </div>
                        <div class="file-upload-text">
                            <strong>Click to upload hero image</strong>
                            <span>PNG, JPG, WEBP — max 10 MB</span>
                        </div>
                        <span class="file-upload-badge">✓ Uploaded</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- SECTIONS -->
        <div id="sections"></div>

        <button type="button" class="btn-add" onclick="addSection()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="16"/>
                <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            Add New Section
        </button>

    </form>
</div>

<!-- EXPORT BAR -->
<div class="export-bar">
    <span class="export-label">Export as</span>
    <button type="button" class="btn-export pdf" onclick="submitForm('pdf')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
        </svg>
        Export PDF
    </button>
    <button type="button" class="btn-export docx" onclick="submitForm('docx')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="15" y2="17"/>
        </svg>
        Export DOCX
    </button>
</div>

<script>
let count = 0;

function addSection() {
    const idx = count;
    const div = document.createElement("div");
    div.className = "section-card";
    div.id = `sec-${idx}`;

    div.innerHTML = `
        <div class="section-header">
            <div class="section-header-left">
                <span class="section-counter">${idx + 1}</span>
                Section
            </div>
            <button type="button" class="btn-remove" onclick="removeSection(${idx})">Remove</button>
        </div>
        <div class="section-body">
            <div class="field">
                <label>Sub Heading</label>
                <input type="text" name="heading_${idx}" placeholder="Section title…">
            </div>
            <div class="field">
                <label>Content</label>
                <textarea name="content_${idx}" placeholder="Write section content here…" style="min-height:120px;"></textarea>
            </div>
            <div class="field">
                <label>Section Image</label>
                <div class="file-upload">
                    <input type="file" name="image_${idx}" accept="image/*" onchange="handleFileChange(this)">
                    <div class="file-upload-ui">
                        <div class="file-upload-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#2562EA" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="3"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                        </div>
                        <div class="file-upload-text">
                            <strong>Click to upload image</strong>
                            <span>PNG, JPG, WEBP — max 10 MB</span>
                        </div>
                        <span class="file-upload-badge">✓ Uploaded</span>
                    </div>
                </div>
            </div>
        </div>
    `;

    document.getElementById("sections").appendChild(div);
    count++;
}

function handleFileChange(input) {
    const wrapper = input.closest('.file-upload');
    const strong = wrapper.querySelector('.file-upload-text strong');
    const hint = wrapper.querySelector('.file-upload-text span');
    if (input.files && input.files.length > 0) {
        const name = input.files[0].name;
        wrapper.classList.add('has-file');
        strong.textContent = name;
        hint.textContent = (input.files[0].size / 1024 / 1024).toFixed(2) + ' MB';
    } else {
        wrapper.classList.remove('has-file');
    }
}

function removeSection(idx) {
    const el = document.getElementById(`sec-${idx}`);
    if (el) el.remove();
}

function submitForm(type) {
    const form = document.getElementById("blogForm");
    const formData = new FormData(form);

    fetch(type === "pdf" ? "/export-pdf" : "/export-docx", {
        method: "POST",
        body: formData
    })
    .then(res => res.blob())
    .then(blob => {
        const link = document.createElement("a");
        link.href = window.URL.createObjectURL(blob);
        link.download = type === "pdf" ? "blog.pdf" : "blog.docx";
        link.click();
    });
}
</script>

</body>
</html>
